name: "Nitro Client Validate"
description: "Validates client operations against the Nitro registry"
author: "ChilliCream"
branding:
  icon: "check-circle"
  color: "orange"

inputs:
  stage:
    description: "The name of the stage"
    required: true
  client-id:
    description: "The ID of the client"
    required: true
  api-key:
    description: "API key for authentication"
    required: true
    secret: true
  operations-file:
    description: "The path to the JSON file with the operations"
    required: true
  cloud-url:
    description: "The URL of the Nitro registry"
    required: false
  comment-mode:
    description: "Controls pull request feedback on validation failure: comment, review, or none"
    required: false
    default: "none"

runs:
  using: "node24"
  main: "dist/index.js"
